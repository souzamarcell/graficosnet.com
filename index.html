<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classificados</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">Classificados</div>
      <div class="tagline">encontre o que você precisa</div>
      <div class="search-wrap">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Pesquisar anúncios..."
            autocomplete="off"
          />
        </div>
      </div>

    </header>

    <div class="section-label" id="sectionLabel">Todos os anúncios</div>

    <div class="grid" id="grid"></div>

    <!-- VIEW MODAL -->
    <div class="overlay" id="viewOverlay" onclick="closeViewModal(event)">
      <div class="modal" id="viewModal">
        <div class="modal-header">
          <div class="modal-cat" id="mCat"></div>
          <div class="modal-title" id="mTitle"></div>
          <div class="modal-price" id="mPrice"></div>
          <button class="btn-close" onclick="closeOverlay('viewOverlay')">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <p class="modal-desc" id="mDesc"></p>
          <div class="modal-tags" id="mTags"></div>
          <div class="modal-info" id="mInfo"></div>
          <button class="btn-contact" id="mContact">Entrar em contato</button>
        </div>
      </div>
    </div>

    <!-- ADD MODAL -->
    <div class="overlay" id="addOverlay" onclick="closeViewModal2(event)">
      <div class="modal">
        <div class="modal-header" style="padding-bottom: 20px">
          <div class="modal-cat">Novo anúncio</div>
          <div class="modal-title">Adicionar Classificado</div>
          <button class="btn-close" onclick="closeOverlay('addOverlay')">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Título</label>
            <input
              class="form-input"
              id="fTitle"
              placeholder="Ex: Martelo profissional"
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Categoria</label>
              <select class="form-select" id="fCat">
                <option value="Ferramentas">Ferramentas</option>
                <option value="Veículos">Veículos</option>
                <option value="Imóveis">Imóveis</option>
                <option value="Eletrônicos">Eletrônicos</option>
                <option value="Serviços">Serviços</option>
                <option value="Moda">Moda</option>
                <option value="Animais">Animais</option>
                <option value="Outros">Outros</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Preço (R$)</label>
              <input
                class="form-input"
                id="fPrice"
                type="number"
                placeholder="0,00"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea
              class="form-textarea"
              id="fDesc"
              placeholder="Descreva o que você está anunciando..."
            ></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Contato</label>
              <input
                class="form-input"
                id="fContact"
                placeholder="Telefone ou e-mail"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Localização</label>
              <input
                class="form-input"
                id="fLocal"
                placeholder="Cidade, Estado"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Tags (separadas por vírgula)</label>
            <input
              class="form-input"
              id="fTags"
              placeholder="novo, madeira, profissional"
            />
          </div>
          <button
            class="btn-contact"
            style="margin-top: 8px"
            onclick="addClassificado()"
          >
            Publicar Anúncio
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
