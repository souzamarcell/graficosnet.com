<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Gerenciador de Senhas</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #0f1218;
    --card: #141820;
    --border: #1e2530;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --danger: #ff3b5c;
    --warning: #ffb300;
    --text: #c8d4e0;
    --text-dim: #5a6a7a;
    --text-bright: #eaf2ff;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(0,229,160,0.3);
  }

  .logo-text {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .logo-text span {
    color: var(--accent);
  }

  .stat-badge {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
  }

  .stat-badge b {
    color: var(--accent);
    font-family: var(--mono);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 9px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tab:hover { color: var(--text); background: var(--border); }

  .tab.active {
    background: linear-gradient(135deg, rgba(0,229,160,0.15), rgba(0,153,255,0.1));
    color: var(--accent);
    border: 1px solid rgba(0,229,160,0.25);
  }

  /* Panels */
  .panel { display: none; animation: fadeIn 0.25s ease; }
  .panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Form */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .form-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-bright);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-title span { color: var(--accent); }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }

  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  input[type="text"],
  input[type="password"],
  input[type="url"],
  textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,160,0.1);
  }

  .pwd-wrap {
    position: relative;
  }

  .pwd-wrap input { width: 100%; padding-right: 42px; }

  .eye-btn {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }

  .eye-btn:hover { color: var(--accent); }

  .gen-btn {
    margin-top: 7px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .gen-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

  .btn {
    padding: 11px 24px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #00c27a);
    color: #000;
    box-shadow: 0 0 20px rgba(0,229,160,0.2);
  }

  .btn-primary:hover {
    box-shadow: 0 0 30px rgba(0,229,160,0.4);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-danger {
    background: rgba(255,59,92,0.1);
    border: 1px solid rgba(255,59,92,0.3);
    color: var(--danger);
  }

  .btn-danger:hover { background: rgba(255,59,92,0.2); }

  .btn-edit {
    background: rgba(0,153,255,0.1);
    border: 1px solid rgba(0,153,255,0.3);
    color: var(--accent2);
  }

  .btn-edit:hover { background: rgba(0,153,255,0.2); }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .search-wrap input {
    width: 100%;
    padding-left: 42px;
    font-size: 15px;
  }

  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
    pointer-events: none;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px; right: 20px;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 20px rgba(255,59,92,0.2); }

  /* Entry list */
  .entries-list { display: flex; flex-direction: column; gap: 10px; }

  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .entry-card:hover {
    border-color: rgba(0,229,160,0.3);
    background: #181f2a;
  }

  .entry-card.selected {
    border-color: var(--accent);
    background: rgba(0,229,160,0.04);
  }

  .entry-card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .entry-card:hover::after, .entry-card.selected::after { opacity: 1; }

  .entry-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .entry-info { flex: 1; min-width: 0; }

  .entry-site {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .entry-login {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .entry-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .icon-btn:hover.copy { border-color: var(--accent); color: var(--accent); }
  .icon-btn:hover.edit { border-color: var(--accent2); color: var(--accent2); }
  .icon-btn:hover.del { border-color: var(--danger); color: var(--danger); }

  /* Detail expand */
  .entry-detail {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: none;
  }

  .entry-detail.open { display: block; animation: fadeIn 0.2s ease; }

  .detail-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .detail-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    width: 68px;
    flex-shrink: 0;
  }

  .detail-val {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-bright);
    flex: 1;
    word-break: break-all;
  }

  .detail-val.masked { letter-spacing: 3px; color: var(--text-dim); }

  .detail-actions { display: flex; gap: 6px; align-items: center; }

  .mini-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .mini-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    width: 100%;
    max-width: 480px;
    padding: 28px;
    position: relative;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 18px 18px 0 0;
  }

  .modal-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-bright);
    margin-bottom: 22px;
  }

  .modal-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }

  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; letter-spacing: 1px; }

  .strength-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    margin-top: 6px;
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }

  .strength-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-dim);
    margin-top: 3px;
  }
  .btn-hdr {
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-backup {
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
  }
  .btn-backup:hover { background: rgba(0,229,160,0.2); box-shadow: 0 0 14px rgba(0,229,160,0.2); }
  .btn-restore {
    background: rgba(0,153,255,0.1);
    border: 1px solid rgba(0,153,255,0.3);
    color: var(--accent2);
  }
  .btn-restore:hover { background: rgba(0,153,255,0.2); box-shadow: 0 0 14px rgba(0,153,255,0.2); }
  .restore-opts { display: flex; flex-direction: column; gap: 12px; margin: 18px 0; }
  .restore-opt {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 16px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; transition: all 0.2s;
  }
  .restore-opt:hover { border-color: rgba(0,153,255,0.4); background: rgba(0,153,255,0.05); }
  .restore-opt input[type=radio] { margin-top: 2px; accent-color: var(--accent2); }
  .restore-opt-title { font-size: 14px; font-weight: 700; color: var(--text-bright); letter-spacing: 1px; }
  .restore-opt-desc { font-size: 12px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .restore-info {
    font-family: var(--mono); font-size: 12px; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
  }
  .restore-info b { color: var(--accent2); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <div class="logo-text">VL<span>T</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px;">
      <div class="stat-badge" style="width:100%;text-align:center;">Entradas: <b id="count">0</b></div>
      <div style="display:flex;gap:7px;width:100%;">
        <button class="btn-hdr btn-backup" style="flex:1;" onclick="exportBackup()" title="Exportar backup JSON">⬇ Backup</button>
        <button class="btn-hdr btn-restore" style="flex:1;" onclick="document.getElementById('restore-file').click()" title="Restaurar de arquivo">⬆ Restaurar</button>
        <input type="file" id="restore-file" accept=".json" style="display:none" onchange="importBackup(this)">
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">
      <span>＋</span> Adicionar
    </button>
    <button class="tab" onclick="switchTab('search')">
      <span>⌕</span> Consultar
    </button>
  </div>

  <!-- ADD PANEL -->
  <div class="panel active" id="panel-add">
    <div class="form-card">
      <div class="form-title"><span>◈</span> Nova Entrada</div>
      <div class="form-grid">
        <div class="field">
          <label>Site / Serviço</label>
          <input type="text" id="add-site" placeholder="ex: Gmail, Netflix…" autocomplete="off">
        </div>
        <div class="field">
          <label>URL (opcional)</label>
          <input type="url" id="add-url" placeholder="https://…" autocomplete="off">
        </div>
        <div class="field">
          <label>Login / E-mail</label>
          <input type="text" id="add-login" placeholder="usuario@email.com" autocomplete="off">
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="pwd-wrap">
            <input type="password" id="add-pwd" placeholder="••••••••" autocomplete="new-password"
              oninput="checkStrength(this.value,'add-strength','add-strength-label')">
            <button class="eye-btn" onclick="toggleEye('add-pwd',this)">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="add-strength"></div></div>
          <div class="strength-label" id="add-strength-label"></div>
          <button class="gen-btn" onclick="generatePassword()">⚡ Gerar senha forte</button>
        </div>
        <div class="field full">
          <label>Nota (opcional)</label>
          <input type="text" id="add-note" placeholder="info extra…" autocomplete="off">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="clearForm()">Limpar</button>
        <button class="btn btn-primary" onclick="saveEntry()">🔒 Salvar</button>
      </div>
    </div>
  </div>

  <!-- SEARCH PANEL -->
  <div class="panel" id="panel-search">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Buscar por site ou login…" oninput="renderList()">
    </div>
    <div class="entries-list" id="entries-list">
      <div class="empty-state">
        <div class="empty-icon">🗄️</div>
        <div class="empty-text">Nenhuma entrada salva ainda</div>
      </div>
    </div>
  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">✏️ Editar Entrada</div>
    <input type="hidden" id="edit-id">
    <div class="modal-field">
      <label>Site / Serviço</label>
      <input type="text" id="edit-site" autocomplete="off">
    </div>
    <div class="modal-field">
      <label>URL</label>
      <input type="url" id="edit-url" autocomplete="off">
    </div>
    <div class="modal-field">
      <label>Login / E-mail</label>
      <input type="text" id="edit-login" autocomplete="off">
    </div>
    <div class="modal-field">
      <label>Senha</label>
      <div class="pwd-wrap">
        <input type="password" id="edit-pwd" autocomplete="new-password"
          oninput="checkStrength(this.value,'edit-strength','edit-strength-label')">
        <button class="eye-btn" onclick="toggleEye('edit-pwd',this)">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="edit-strength"></div></div>
      <div class="strength-label" id="edit-strength-label"></div>
    </div>
    <div class="modal-field">
      <label>Nota</label>
      <input type="text" id="edit-note" autocomplete="off">
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 Salvar</button>
    </div>
  </div>
</div>


<!-- RESTORE MODAL -->
<div class="modal-overlay" id="modal-restore">
  <div class="modal">
    <div class="modal-title">⬆ Restaurar Backup</div>
    <div class="restore-info" id="restore-info">Nenhum arquivo carregado</div>
    <div class="restore-opts">
      <label class="restore-opt">
        <input type="radio" name="restore-mode" value="merge" checked>
        <div>
          <div class="restore-opt-title">🔀 Mesclar</div>
          <div class="restore-opt-desc">Adiciona as entradas do backup às existentes. Duplicatas (mesmo site + login) são ignoradas.</div>
        </div>
      </label>
      <label class="restore-opt">
        <input type="radio" name="restore-mode" value="replace">
        <div>
          <div class="restore-opt-title">♻ Substituir tudo</div>
          <div class="restore-opt-desc">Apaga todas as entradas atuais e importa somente as do backup. Ação irreversível.</div>
        </div>
      </label>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeRestoreModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirm-restore" onclick="confirmRestore()" disabled>✓ Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let entries = JSON.parse(localStorage.getItem('vlt_entries') || '[]');
  let openCard = null;

  function save() {
    localStorage.setItem('vlt_entries', JSON.stringify(entries));
    document.getElementById('count').textContent = entries.length;
  }

  function toast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (err ? ' error' : '');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.className = 'toast', 2500);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='add')||(i===1&&tab==='search')));
    document.getElementById('panel-add').classList.toggle('active', tab==='add');
    document.getElementById('panel-search').classList.toggle('active', tab==='search');
    if (tab==='search') renderList();
  }

  function toggleEye(id, btn) {
    const inp = document.getElementById(id);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁';
  }

  function checkStrength(val, barId, labelId) {
    const bar = document.getElementById(barId);
    const lbl = document.getElementById(labelId);
    if (!val) { bar.style.width='0%'; lbl.textContent=''; return; }
    let score = 0;
    if (val.length >= 8) score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/\d/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { w:'20%', c:'#ff3b5c', t:'Muito fraca' },
      { w:'40%', c:'#ff8800', t:'Fraca' },
      { w:'60%', c:'#ffb300', t:'Razoável' },
      { w:'80%', c:'#7ed321', t:'Forte' },
      { w:'100%', c:'#00e5a0', t:'Muito forte' },
    ];
    const l = levels[Math.min(score,4)];
    bar.style.width = l.w;
    bar.style.background = l.c;
    lbl.textContent = l.t;
    lbl.style.color = l.c;
  }

  function generatePassword() {
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*()_+-=[]{}';
    let pwd = '';
    for (let i=0; i<16; i++) pwd += chars[Math.floor(Math.random()*chars.length)];
    const inp = document.getElementById('add-pwd');
    inp.value = pwd;
    inp.type = 'text';
    document.querySelector('[onclick="toggleEye(\'add-pwd\',this)"]').textContent = '🙈';
    checkStrength(pwd,'add-strength','add-strength-label');
    toast('⚡ Senha gerada!');
  }

  function clearForm() {
    ['add-site','add-url','add-login','add-pwd','add-note'].forEach(id => document.getElementById(id).value='');
    document.getElementById('add-strength').style.width='0%';
    document.getElementById('add-strength-label').textContent='';
  }

  function saveEntry() {
    const site = document.getElementById('add-site').value.trim();
    const login = document.getElementById('add-login').value.trim();
    const pwd = document.getElementById('add-pwd').value;
    if (!site || !login || !pwd) { toast('⚠ Site, login e senha são obrigatórios', true); return; }
    entries.unshift({
      id: Date.now(),
      site,
      url: document.getElementById('add-url').value.trim(),
      login,
      pwd,
      note: document.getElementById('add-note').value.trim(),
      created: new Date().toLocaleDateString('pt-BR')
    });
    save();
    clearForm();
    toast('✓ Entrada salva com sucesso!');
  }

  function renderList() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = q ? entries.filter(e =>
      e.site.toLowerCase().includes(q) ||
      e.login.toLowerCase().includes(q) ||
      (e.url || '').toLowerCase().includes(q) ||
      (e.note || '').toLowerCase().includes(q)
    ) : entries;

    const list = document.getElementById('entries-list');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">${entries.length ? 'Nenhum resultado encontrado' : 'Nenhuma entrada salva ainda'}</div>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(e => `
      <div class="entry-card" id="card-${e.id}" onclick="toggleCard(${e.id})">
        <div class="entry-header">
          <div class="entry-info">
            <div class="entry-site">${escHtml(e.site)}</div>
            <div class="entry-login">${escHtml(e.login)}</div>
          </div>
          <div class="entry-actions" onclick="event.stopPropagation()">
            <button class="icon-btn copy" title="Copiar senha" onclick="copyPwd(${e.id})">📋</button>
            <button class="icon-btn edit" title="Editar" onclick="openEdit(${e.id})">✏️</button>
            <button class="icon-btn del" title="Excluir" onclick="deleteEntry(${e.id})">🗑</button>
          </div>
        </div>
        <div class="entry-detail" id="detail-${e.id}">
          <div class="detail-row">
            <span class="detail-label">Login</span>
            <span class="detail-val">${escHtml(e.login)}</span>
            <div class="detail-actions">
              <button class="mini-btn" onclick="copyText('${escAttr(e.login)}')">copiar</button>
            </div>
          </div>
          <div class="detail-row">
            <span class="detail-label">Senha</span>
            <span class="detail-val masked" id="pwd-val-${e.id}">••••••••••••</span>
            <div class="detail-actions">
              <button class="mini-btn" id="show-btn-${e.id}" onclick="toggleShowPwd(${e.id},'${escAttr(e.pwd)}')">mostrar</button>
              <button class="mini-btn" onclick="copyText('${escAttr(e.pwd)}')">copiar</button>
            </div>
          </div>
          ${e.url ? `<div class="detail-row">
            <span class="detail-label">URL</span>
            <a class="detail-val" href="${escHtml(e.url)}" target="_blank" style="color:var(--accent2);text-decoration:none">${escHtml(e.url)}</a>
          </div>` : ''}
          ${e.note ? `<div class="detail-row">
            <span class="detail-label">Nota</span>
            <span class="detail-val" style="color:var(--text-dim)">${escHtml(e.note)}</span>
          </div>` : ''}
          <div class="detail-row">
            <span class="detail-label">Data</span>
            <span class="detail-val" style="color:var(--text-dim)">${e.created||''}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggleCard(id) {
    const detail = document.getElementById('detail-'+id);
    const card = document.getElementById('card-'+id);
    const isOpen = detail.classList.contains('open');
    // close all
    document.querySelectorAll('.entry-detail.open').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.entry-card.selected').forEach(c => c.classList.remove('selected'));
    if (!isOpen) { detail.classList.add('open'); card.classList.add('selected'); }
  }

  function toggleShowPwd(id, pwd) {
    const el = document.getElementById('pwd-val-'+id);
    const btn = document.getElementById('show-btn-'+id);
    const isMasked = el.classList.contains('masked');
    el.textContent = isMasked ? pwd : '••••••••••••';
    el.classList.toggle('masked', !isMasked);
    btn.textContent = isMasked ? 'ocultar' : 'mostrar';
  }

  function copyPwd(id) {
    const e = entries.find(x => x.id === id);
    if (e) copyText(e.pwd);
  }

  function copyText(text) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => toast('📋 Copiado!')).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    } catch(e) {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      toast('📋 Copiado!');
    } catch(e) {
      toast('Erro ao copiar', true);
    }
    document.body.removeChild(ta);
  }

  function deleteEntry(id) {
    if (!confirm('Excluir esta entrada?')) return;
    entries = entries.filter(e => e.id !== id);
    save();
    renderList();
    toast('🗑 Entrada excluída');
  }

  function openEdit(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-site').value = e.site;
    document.getElementById('edit-url').value = e.url||'';
    document.getElementById('edit-login').value = e.login;
    document.getElementById('edit-pwd').value = e.pwd;
    document.getElementById('edit-note').value = e.note||'';
    checkStrength(e.pwd,'edit-strength','edit-strength-label');
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function saveEdit() {
    const id = parseInt(document.getElementById('edit-id').value);
    const site = document.getElementById('edit-site').value.trim();
    const login = document.getElementById('edit-login').value.trim();
    const pwd = document.getElementById('edit-pwd').value;
    if (!site || !login || !pwd) { toast('⚠ Campos obrigatórios', true); return; }
    const e = entries.find(x => x.id === id);
    if (e) {
      e.site = site;
      e.url = document.getElementById('edit-url').value.trim();
      e.login = login;
      e.pwd = pwd;
      e.note = document.getElementById('edit-note').value.trim();
      save();
      renderList();
      closeModal();
      toast('✓ Entrada atualizada!');
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return String(s).replace(/'/g,"\\'").replace(/\\/g,'\\\\');
  }

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });


  // --- BACKUP ---
  let pendingBackup = null;

  function exportBackup() {
    if (!entries.length) { toast('⚠ Nenhuma entrada para exportar', true); return; }
    const data = JSON.stringify({ version: 1, exported: new Date().toISOString(), entries }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = 'vault-backup-' + date + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('⬇ Backup exportado!');
  }

  function importBackup(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        let imported = [];
        if (Array.isArray(data)) {
          imported = data;
        } else if (data.entries && Array.isArray(data.entries)) {
          imported = data.entries;
        } else {
          throw new Error('Formato inválido');
        }
        if (!imported.length) { toast('⚠ Backup vazio ou inválido', true); return; }
        pendingBackup = imported;
        const info = document.getElementById('restore-info');
        info.innerHTML = `Arquivo: <b>${file.name}</b> &nbsp;|&nbsp; Entradas no backup: <b>${imported.length}</b> &nbsp;|&nbsp; Entradas atuais: <b>${entries.length}</b>`;
        document.getElementById('btn-confirm-restore').disabled = false;
        document.getElementById('modal-restore').classList.add('open');
      } catch(err) {
        toast('❌ Arquivo inválido: ' + err.message, true);
      }
    };
    reader.readAsText(file);
    input.value = '';
  }

  function confirmRestore() {
    if (!pendingBackup) return;
    const mode = document.querySelector('input[name="restore-mode"]:checked').value;
    if (mode === 'replace') {
      if (!confirm('⚠ Isso apagará TODAS as entradas atuais. Continuar?')) return;
      entries = pendingBackup.map(e => ({ ...e, id: e.id || Date.now() + Math.random() }));
    } else {
      // merge — skip duplicates by site+login
      const existing = new Set(entries.map(e => (e.site+'|'+e.login).toLowerCase()));
      let added = 0;
      for (const e of pendingBackup) {
        const key = (e.site+'|'+e.login).toLowerCase();
        if (!existing.has(key)) {
          entries.unshift({ ...e, id: e.id || Date.now() + Math.random() });
          existing.add(key);
          added++;
        }
      }
      toast(`✓ ${added} entr${added===1?'ada':'adas'} importada${added===1?'':'s'}!`);
    }
    save();
    renderList();
    closeRestoreModal();
    if (mode === 'replace') toast(`✓ ${entries.length} entradas restauradas!`);
    pendingBackup = null;
  }

  function closeRestoreModal() {
    document.getElementById('modal-restore').classList.remove('open');
    pendingBackup = null;
    document.getElementById('btn-confirm-restore').disabled = true;
  }

  document.getElementById('modal-restore').addEventListener('click', function(e) {
    if (e.target === this) closeRestoreModal();
  });

  // Init
  document.getElementById('count').textContent = entries.length;
</script>
</body>
</html>
